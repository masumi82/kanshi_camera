# Raspberry Pi - Kanshi Camera Container Configuration
# /etc/atmark/containers/kanshi_camera.conf
#
# Raspberry Pi OS container configuration for the surveillance camera system.
# This file is read by podman_start to launch the container.

# Container image (built and stored locally on the device)
set_image localhost/kanshi_camera:latest

# --- Device Access ---
# Grant access to the USB/CSI camera device.
# /dev/video0 is the default V4L2 device.
add_devices /dev/video0

# Add host video group GID (27) so kanshi user can access /dev/video0
# Resource limits: 256MB RAM, 0.8 CPU
add_args --group-add 27 --memory 256m --cpus 0.8 --env-file /etc/kanshi_camera/.env

# --- Network ---
# Expose the uStreamer endpoint on port 8080 and web gallery on port 8888.
# SECURITY: Both ports are accessible to all hosts on the connected network.
# This system is intended for use on a private/closed LAN only.
# Ensure network-level access control (firewall, VLAN, or NAT) is in place
# before connecting to any network reachable from untrusted hosts.
add_ports 8080:8080
add_ports 8888:8888

# --- Volumes ---
# Mount the environment file as read-only.
# Contains API keys and configuration (managed outside the container).
add_volumes /etc/kanshi_camera/.env:/app/.env:ro

# Persistent storage for the retry queue.
# Ensures unsent frames survive container restarts.
add_volumes kanshi_retry:/var/lib/kanshi/retry

# Persistent storage for the web gallery.
add_volumes kanshi_gallery:/var/lib/kanshi/gallery

# Persistent storage for runtime settings (capture interval etc.).
add_volumes kanshi_state:/var/lib/kanshi/state

# --- Restart Policy ---
# Always restart the container on failure or device reboot.
set_restart always

# --- Health Check ---
# Periodically verify the application is responsive.
#   interval : check every 1 minute
#   timeout  : 10s
#   retries  : mark unhealthy after 3 consecutive failures
set_healthcheck --interval="1 min" --timeout=10s --retries=3 \
    "python3 /app/src/health.py"
